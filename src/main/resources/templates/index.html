<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12306抢票系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: linear-gradient(135deg, #e8f0fe 0%, #f8fafc 100%); min-height: 100vh; color: #333; }
        .header { background: #2563eb; color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 10px rgba(37,99,235,0.3); }
        .header h1 { font-size: 24px; }
        .nav a { color: white; text-decoration: none; margin-left: 25px; padding: 8px 16px; border-radius: 4px; transition: background 0.3s; }
        .nav a:hover, .nav a.active { background: rgba(255,255,255,0.2); }
        .container { max-width: 900px; margin: 60px auto; text-align: center; }
        .hero { color: #1e3a5f; margin-bottom: 50px; }
        .hero h2 { font-size: 36px; margin-bottom: 15px; }
        .hero p { font-size: 18px; opacity: 0.7; }
        .features { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .card { background: white; border-radius: 12px; padding: 35px 25px; width: 240px; text-align: center; box-shadow: 0 8px 25px rgba(37,99,235,0.08); transition: transform 0.3s; text-decoration: none; color: inherit; display: block; }
        .card:hover { transform: translateY(-5px); }
        .card .icon { font-size: 48px; margin-bottom: 15px; }
        .card h3 { font-size: 20px; margin-bottom: 8px; color: #2563eb; }
        .card p { font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚄 12306抢票系统</h1>
        <div class="nav">
            <a href="/" class="active">首页</a>
            <a href="/trains">车次查询</a>
            <a href="/orders">我的订单</a>
            <a href="/waitlist">我的候补</a>
            <a href="javascript:void(0)" id="nav-user" style="color:#bfdbfe;font-weight:bold;" onclick="doLogout()">登录/注册</a>
        </div>
    </div>

    <div class="container">
        <div class="hero">

        </div>
        <div class="features">
            <a href="/trains" class="card">
                <div class="icon">🔍</div>
                <h3>查询车次</h3>
                <p>实时查看所有列车班次和余票信息</p>
            </a>
            <a href="/buy" class="card">
                <div class="icon">🎫</div>
                <h3>在线购票</h3>
                <p>秒级抢票，Redis保证数据一致性</p>
            </a>
            <a href="/orders" class="card">
                <div class="icon">📋</div>
                <h3>我的订单</h3>
                <p>查看购票记录，支持在线退票</p>
            </a>
            <a href="/waitlist" class="card">
                <div class="icon">⏳</div>
                <h3>候补排队</h3>
                <p>无票时自动排队，有票时自动转正</p>
            </a>
        </div>
    </div>

    <script>
        // 检查登录状态
        fetch('/api/user/current')
            .then(function(r) { return r.json(); })
            .then(function(res) {
                var navUser = document.getElementById('nav-user');
                if (res.code === 0 && res.data) {
                    navUser.textContent = '👤 ' + res.data.username;
                    navUser.href = '#';
                    navUser.setAttribute('onclick', 'doLogout()');
                } else {
                    navUser.textContent = '登录/注册';
                    navUser.href = '/login';
                    navUser.removeAttribute('onclick');
                }
            });

        function doLogout() {
            if (confirm('确定退出登录？')) {
                fetch('/api/user/logout', { method: 'POST' })
                    .then(function() { window.location.href = '/login'; });
            }
        }
    </script>
</body>
</html>
