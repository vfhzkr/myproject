<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录注册 - 抢票系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: linear-gradient(135deg, #e8f0fe 0%, #f0f7ff 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; background: #2563eb; color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 10px rgba(37,99,235,0.3); }
        .header h1 { font-size: 22px; }
        .nav a { color: white; text-decoration: none; margin-left: 25px; padding: 8px 16px; border-radius: 4px; transition: background 0.3s; }
        .nav a:hover, .nav a.active { background: rgba(255,255,255,0.2); }
        .container { margin-top: 80px; width: 420px; }
        .tabs { display: flex; margin-bottom: 20px; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(37,99,235,0.1); }
        .tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; background: #e8e8e8; color: #999; font-size: 16px; font-weight: bold; transition: all 0.3s; }
        .tab.active { background: #2563eb; color: white; }
        .tab:hover:not(.active) { background: #d0d0d0; }
        .card { background: white; border-radius: 12px; padding: 35px 30px; box-shadow: 0 8px 30px rgba(37,99,235,0.08); }
        .card h2 { font-size: 22px; margin-bottom: 25px; color: #1e3a5f; text-align: center; }
        .form-group { margin-bottom: 18px; position: relative; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #666; font-weight: bold; }
        .form-group input { width: 100%; padding: 12px 14px; border: 2px solid #e8e8e8; border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.3s; }
        .form-group input:focus { border-color: #3b82f6; }
        .form-panel { display: none; }
        .form-panel.show { display: block; }
        .btn-submit { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 17px; cursor: pointer; font-weight: bold; transition: all 0.3s; margin-top: 10px; }
        .btn-submit:hover { background: #1d4ed8; }
        .btn-submit:disabled { background: #93c5fd; cursor: not-allowed; }
        .msg { padding: 10px 14px; border-radius: 6px; margin-top: 12px; display: none; font-size: 14px; text-align: center; }
        .msg.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; display: block; }
        .msg.error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; display: block; }
        .extra { display: none; }
        .extra.show { display: block; }
        .tip { text-align: center; margin-top: 20px; color: #94a3b8; font-size: 13px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚄 12306抢票系统</h1>
        <div class="nav">
            <a href="/">首页</a>
            <a href="/trains">车次查询</a>
            <a href="/login" class="active">登录</a>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">登录</div>
            <div class="tab" onclick="switchTab('register')">注册</div>
        </div>

        <div class="card">
            <!-- 登录表单 -->
            <div class="form-panel show" id="panel-login">
                <h2>用户登录</h2>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名" onkeydown="if(event.key==='Enter')doLogin()" />
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()" />
                </div>
                <button class="btn-submit" onclick="doLogin()">登 录</button>
                <div id="login-msg" class="msg"></div>
            </div>

            <!-- 注册表单 -->
            <div class="form-panel" id="panel-register">
                <h2>用户注册</h2>
                <div class="form-group">
                    <label>用户名 *</label>
                    <input type="text" id="reg-username" placeholder="请输入用户名" />
                </div>
                <div class="form-group">
                    <label>密码 *</label>
                    <input type="password" id="reg-password" placeholder="至少4位" />
                </div>
                <div class="form-group">
                    <label>确认密码 *</label>
                    <input type="password" id="reg-password2" placeholder="再次输入密码" />
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="text" id="reg-phone" placeholder="选填" />
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="text" id="reg-email" placeholder="选填" />
                </div>
                <button class="btn-submit" onclick="doRegister()">注 册</button>
                <div id="reg-msg" class="msg"></div>
            </div>
        </div>
        <div class="tip">SpringBoot + MyBatis + Redis | 高并发抢票</div>
    </div>

    <script>
        // 如果已登录，跳转到首页
        fetch('/api/user/current')
            .then(function(r) { return r.json(); })
            .then(function(res) {
                if (res.code === 0) window.location.href = '/';
            });

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(function(el, i) {
                el.classList.toggle('active', i === (tab === 'login' ? 0 : 1));
            });
            document.getElementById('panel-login').classList.toggle('show', tab === 'login');
            document.getElementById('panel-register').classList.toggle('show', tab === 'register');
        }

        function doLogin() {
            var username = document.getElementById('login-username').value.trim();
            var password = document.getElementById('login-password').value;
            if (!username) { showMsg('login-msg', '请输入用户名', 'error'); return; }
            if (!password) { showMsg('login-msg', '请输入密码', 'error'); return; }

            var btn = document.querySelector('#panel-login .btn-submit');
            btn.disabled = true;
            btn.textContent = '登录中...';

            fetch('/api/user/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'username=' + encodeURIComponent(username) + '&password=' + encodeURIComponent(password)
            })
            .then(function(r) { return r.json(); })
            .then(function(res) {
                btn.disabled = false;
                btn.textContent = '登 录';
                if (res.code === 0) {
                    showMsg('login-msg', '登录成功，正在跳转...', 'success');
                    setTimeout(function() { window.location.href = '/'; }, 800);
                } else {
                    showMsg('login-msg', res.msg, 'error');
                }
            });
        }

        function doRegister() {
            var username = document.getElementById('reg-username').value.trim();
            var password = document.getElementById('reg-password').value;
            var password2 = document.getElementById('reg-password2').value;
            var phone = document.getElementById('reg-phone').value.trim();
            var email = document.getElementById('reg-email').value.trim();

            if (!username) { showMsg('reg-msg', '请输入用户名', 'error'); return; }
            if (password.length < 4) { showMsg('reg-msg', '密码至少4位', 'error'); return; }
            if (password !== password2) { showMsg('reg-msg', '两次密码不一致', 'error'); return; }

            var btn = document.querySelector('#panel-register .btn-submit');
            btn.disabled = true;
            btn.textContent = '注册中...';

            var body = 'username=' + encodeURIComponent(username) + '&password=' + encodeURIComponent(password);
            if (phone) body += '&phone=' + encodeURIComponent(phone);
            if (email) body += '&email=' + encodeURIComponent(email);

            fetch('/api/user/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body
            })
            .then(function(r) { return r.json(); })
            .then(function(res) {
                btn.disabled = false;
                btn.textContent = '注 册';
                if (res.code === 0) {
                    showMsg('reg-msg', '注册成功！请前往登录', 'success');
                    document.getElementById('reg-username').value = '';
                    document.getElementById('reg-password').value = '';
                    document.getElementById('reg-password2').value = '';
                    document.getElementById('reg-phone').value = '';
                    document.getElementById('reg-email').value = '';
                    setTimeout(function() { switchTab('login'); }, 1000);
                } else {
                    showMsg('reg-msg', res.msg, 'error');
                }
            });
        }

        function showMsg(elemId, text, type) {
            var el = document.getElementById(elemId);
            el.textContent = text;
            el.className = 'msg ' + type;
        }
    </script>
</body>
</html>
