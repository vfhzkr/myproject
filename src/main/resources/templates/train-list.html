<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>车次查询 - 抢票系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f6fa; min-height: 100vh; }
        .header { background: #e60012; color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 22px; }
        .nav a { color: white; text-decoration: none; margin-left: 25px; padding: 8px 16px; border-radius: 4px; }
        .nav a:hover, .nav a.active { background: rgba(255,255,255,0.2); }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .search-box { background: white; padding: 20px 30px; border-radius: 10px; margin-bottom: 25px; display: flex; gap: 15px; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .search-box input { flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 15px; outline: none; transition: border-color 0.3s; }
        .search-box input:focus { border-color: #e60012; }
        .search-box button { padding: 12px 30px; background: #e60012; color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; transition: background 0.3s; }
        .search-box button:hover { background: #cc0000; }
        .train-card { background: white; border-radius: 10px; padding: 20px 30px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: box-shadow 0.3s; }
        .train-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .train-info h3 { font-size: 20px; margin-bottom: 8px; }
        .train-info .train-no { color: #e60012; font-weight: bold; margin-right: 10px; }
        .train-info .route { color: #555; font-size: 15px; }
        .train-info .time { color: #888; font-size: 13px; margin-top: 4px; }
        .train-right { text-align: right; }
        .train-right .price { font-size: 24px; color: #e60012; font-weight: bold; }
        .train-right .seats { color: #666; font-size: 14px; margin-bottom: 10px; }
        .train-right .btn { display: inline-block; padding: 10px 24px; background: #e60012; color: white; text-decoration: none; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; transition: background 0.3s; }
        .train-right .btn:hover { background: #cc0000; }
        .train-right .btn.disabled { background: #ccc; cursor: not-allowed; }
        .empty { text-align: center; padding: 60px; color: #999; font-size: 16px; }
        .loading { text-align: center; padding: 60px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚄 车次查询</h1>
        <div class="nav">
            <a href="/">首页</a>
            <a href="/trains" class="active">车次查询</a>
            <a href="/orders">我的订单</a>
            <a href="/waitlist">我的候补</a>
            <a href="javascript:void(0)" id="nav-user" style="color:#ffeb3b;font-weight:bold;" onclick="doLogout()">登录/注册</a>
        </div>
    </div>

    <div class="container">
        <div class="search-box">
            <input type="text" id="departure" placeholder="出发站，如：北京" />
            <input type="text" id="destination" placeholder="到达站，如：上海" />
            <button onclick="searchTrains()">🔍 查询</button>
        </div>

        <div id="trainList">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        // 页面加载时查询所有
        window.onload = function() { searchTrains(); };

        function searchTrains() {
            var dep = document.getElementById('departure').value;
            var dest = document.getElementById('destination').value;
            var url = '/api/trains';
            if (dep && dest) {
                url += '?departure=' + encodeURIComponent(dep) + '&destination=' + encodeURIComponent(dest);
            }
            document.getElementById('trainList').innerHTML = '<div class="loading">加载中...</div>';

            fetch(url)
                .then(function(r) { return r.json(); })
                .then(function(res) {
                    var html = '';
                    if (res.data && res.data.length > 0) {
                        res.data.forEach(function(t) {
                            var btnClass = t.availableSeats > 0 ? 'btn' : 'btn disabled';
                            var btnText = t.availableSeats > 0 ? '购买' : '无票(候补)';
                            var onclick = t.availableSeats > 0
                                ? 'onclick="goBuy(' + t.id + ')"'
                                : 'onclick="goWaitlist(' + t.id + ')"';
                            html += '<div class="train-card">' +
                                '<div class="train-info">' +
                                '<h3><span class="train-no">' + t.trainNo + '</span>' + t.departure + ' → ' + t.destination + '</h3>' +
                                '<div class="time">出发：' + t.departureTime + ' | 到达：' + t.arrivalTime + '</div>' +
                                '</div>' +
                                '<div class="train-right">' +
                                '<div class="price">¥' + t.price + '</div>' +
                                '<div class="seats">余票：<b>' + t.availableSeats + '</b> 张</div>' +
                                '<button class="' + btnClass + '" ' + onclick + '>' + btnText + '</button>' +
                                '</div>' +
                                '</div>';
                        });
                    } else {
                        html = '<div class="empty">暂无车次信息</div>';
                    }
                    document.getElementById('trainList').innerHTML = html;
                });
        }

        function goBuy(trainId) {
            checkLoginThen(function() { window.location.href = '/buy?trainId=' + trainId; });
        }

        function goWaitlist(trainId) {
            checkLoginThen(function() {
                if (confirm('该车次暂无余票，是否加入候补队列？')) {
                    fetch('/api/waitlist', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: 'trainId=' + trainId + '&count=1'
                    })
                    .then(function(r) { return r.json(); })
                    .then(function(res) {
                        if (res.code === -1 && res.msg === '请先登录') {
                            window.location.href = '/login';
                            return;
                        }
                        alert(res.msg);
                        if (res.code === 0) window.location.href = '/waitlist';
                    });
                }
            });
        }

        function checkLoginThen(callback) {
            fetch('/api/user/current')
                .then(function(r) { return r.json(); })
                .then(function(res) {
                    if (res.code === 0) {
                        callback();
                    } else {
                        alert('请先登录');
                        window.location.href = '/login';
                    }
                });
        }

        // 检查登录状态
        fetch('/api/user/current')
            .then(function(r) { return r.json(); })
            .then(function(res) {
                var navUser = document.getElementById('nav-user');
                if (res.code === 0 && res.data) {
                    navUser.textContent = '👤 ' + res.data.username;
                    navUser.href = '#';
                    navUser.setAttribute('onclick', 'doLogout()');
                } else {
                    navUser.textContent = '登录/注册';
                    navUser.href = '/login';
                    navUser.removeAttribute('onclick');
                }
            });

        function doLogout() {
            if (confirm('确定退出登录？')) {
                fetch('/api/user/logout', { method: 'POST' })
                    .then(function() { window.location.href = '/login'; });
            }
        }
    </script>
</body>
</html>
